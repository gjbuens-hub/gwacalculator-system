<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Web-Based GWA System</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { font-family: Arial, sans-serif; background: #f5f7fa; margin: 0; }
    .login-box, .page { max-width: 500px; margin: 40px auto; padding: 20px; background: white; border-radius: 6px; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
    h2 { color:#004080; text-align:center; }
    input { padding:8px; margin:4px; border:1px solid #ccc; border-radius:4px; }
    button { padding:8px 12px; margin:4px; background:#004080; color:white; border:none; border-radius:4px; cursor:pointer; }
    button:hover { background:#0066cc; }
    table { width:100%; border-collapse:collapse; margin-top:15px; }
    th, td { border:1px solid #ccc; padding:8px; text-align:center; }
    th { background:#f0f0f0; }
    .chart-box { margin-top:20px; background:#fafafa; border:1px solid #ccc; border-radius:6px; padding:20px; }
  </style>
</head>
<body>

<!-- Login -->
<div id="loginPage" class="login-box">
  <h2>Welcome Back</h2>
  <p style="text-align:center;">Sign in to your academic dashboard</p>
  <label>SCHOOL ID</label>
  <input type="text" id="username" placeholder="StudentID" style="width:100%;">
  <label>PASSWORD</label>
  <input type="password" id="password" placeholder="Enter your password" style="width:100%;">
  <button onclick="login()">Sign In</button>
</div>

<!-- Dashboard -->
<div id="dashboardPage" class="page" style="display:none;">
  <h2>Dashboard</h2>
  <p>Welcome, <span id="userDisplay"></span>!</p>

  <!-- Grade Input Table -->
  <table id="gradesTable">
    <tr><th>Subject</th><th>Units</th><th>Grade</th></tr>
    <tr>
      <td><input type="text" placeholder="Subject"></td>
      <td><input type="number" placeholder="Units"></td>
      <td><input type="number" step="0.01" placeholder="Grade"></td>
    </tr>
  </table>
  <button onclick="addRow()">Add Subject</button>
  <button onclick="computeGWA()">Compute GWA</button>

  <!-- Results -->
  <div id="results" style="margin-top:15px;"></div>

  <!-- Chart -->
  <div class="chart-box">
    <h3>Performance Trend</h3>
    <canvas id="gwaTrendChart"></canvas>
  </div>

  <button onclick="logout()" style="margin-top:15px; background:#c00;">Log Out</button>
</div>

<script>
  let gwaData = []; // store computed GWA per semester

  function login() {
    const user = document.getElementById("username").value;
    const pass = document.getElementById("password").value;
    if(user === "strongadmin" && pass === "pass123") {
      document.getElementById("loginPage").style.display = "none";
      document.getElementById("dashboardPage").style.display = "block";
      document.getElementById("userDisplay").innerText = user;
      initChart();
    } else {
      alert("Invalid credentials. Try username: strongadmin and password: pass123");
    }
  }

  function addRow() {
    const table = document.getElementById("gradesTable");
    const row = table.insertRow();
    row.innerHTML = `
      <td><input type="text" placeholder="Subject"></td>
      <td><input type="number" placeholder="Units"></td>
      <td><input type="number" step="0.01" placeholder="Grade"></td>
    `;
  }

  function computeGWA() {
    const table = document.getElementById("gradesTable");
    let totalUnits = 0;
    let weightedSum = 0;

    for(let i=1; i<table.rows.length; i++) {
      const units = parseFloat(table.rows[i].cells[1].children[0].value);
      const grade = parseFloat(table.rows[i].cells[2].children[0].value);
      if(!isNaN(units) && !isNaN(grade)) {
        totalUnits += units;
        weightedSum += units * grade;
      }
    }

    if(totalUnits > 0) {
      const gwa = (weightedSum / totalUnits).toFixed(2);
      document.getElementById("results").innerHTML = `<p><strong>Computed GWA:</strong> ${gwa}</p>`;
      // push to trend data
      gwaData.push(gwa);
      updateChart();
    } else {
      alert("Please enter valid units and grades.");
    }
  }

  let chart;
  function initChart() {
    const ctx = document.getElementById('gwaTrendChart').getContext('2d');
    chart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: [],
        datasets: [{
          label: 'GWA Trend',
          data: [],
          borderColor: '#004080',
          backgroundColor: 'rgba(0,64,128,0.1)',
          fill: true,
          tension: 0.3
        }]
      },
      options: {
        scales: {
          y: { beginAtZero: true }
        }
      }
    });
  }

  function updateChart() {
    chart.data.labels = gwaData.map((_, i) => `Sem ${i+1}`);
    chart.data.datasets[0].data = gwaData;
    chart.update();
  }

  function logout() {
  const confirmLogout = confirm("Are you sure you want to logout?");
  if (confirmLogout) {
    document.getElementById("dashboardPage").style.display = "none";
    document.getElementById("recordsPage").style.display = "none";
    document.getElementById("analysisPage").style.display = "none";
    document.getElementById("loginPage").style.display = "block";
    document.getElementById("username").value = "";
    document.getElementById("password").value = "";
    gwaData = [];
    chart.data.labels = [];
    chart.data.datasets[0].data = [];
    chart.update();
  }
}
</script>

</body>
</html>
